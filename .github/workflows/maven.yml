name: Java CI with Maven

on:
  push:
    branches: ["main"]

env:
  APP_NAME: devopsshack-java-demo

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      docker: ${{ steps.filter.outputs.docker }}
      mytest: ${{ steps.filter.outputs.mytest }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'src/**'
              - 'pom.xml'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
            docker:
              - 'Dockerfile'
              - 'docker/**'
            mytest:
              - 'My-Test/**'

  pre_build:
    name: Pre Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mytest == 'true'
    env:
      STAGE_NAME: before_package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: |
          mvn test
          echo "App Name: $APP_NAME"
          echo "Stage Name: $STAGE_NAME"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, pre_build]
    if: needs.changes.outputs.java == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: |
          mvn package
          echo "App Name: $APP_NAME"
          echo "Stage Name: $STAGE_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: boardgame
          path: target/*jar







